<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riko Web Interface</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { background-color: #1e1e1e; border-radius: 12px; padding: 20px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; }
        .header { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #4dabf7; }
        .chat-box { background-color: #2a2a2a; border-radius: 8px; padding: 15px; height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 80%; }
        .user-message { background-color: #4dabf7; color: white; align-self: flex-end; }
        .riko-message { background-color: #333; color: white; align-self: flex-start; border: 1px solid #444; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border-radius: 6px; border: 1px solid #444; background-color: #2a2a2a; color: white; outline: none; }
        input[type="text"]:focus { border-color: #4dabf7; }
        button { padding: 10px 20px; border-radius: 6px; border: none; background-color: #4dabf7; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #3b8cd9; }
        button:disabled { background-color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Riko AI</div>
    <div class="chat-box" id="chat-box">
        <div class="message riko-message">Hello! I am Riko. How can I help you today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        addMessage(message, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                addMessage(data.reply, 'riko');
            } else {
                addMessage(`Error: ${data.error || 'Unknown error'} - ${data.details || ''}`, 'riko');
            }
        } catch (error) {
            addMessage(`Network Error: ${error.message}`, 'riko');
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
